name: Arduino CLI CI build

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.board.arduino_board }} - ${{ matrix.board.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        board:

          # ESP32
          - name: "ESP32 Dev Module"
            fname: "esp32"
            fqbn: "esp32:esp32:esp32"
            core: "esp32:esp32@3.3.7"
            urls: "https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json"
            family: "ESP32"
            extra_libs: ""
            options: ""
            fs_size: 0x140000
            fs_base: ""
            fs_family: ""
            manual_only: false
        
          - name: "ESP32S2 Dev Module"
            fname: "esp32s2"
            fqbn: "esp32:esp32:esp32s2"
            core: "esp32:esp32@3.3.7"
            urls: "https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json"
            family: "ESP32"
            extra_libs: ""
            options: ""
            fs_size: 0x140000
            fs_base: ""
            fs_family: ""
            manual_only: false

          - name: "LOLIN S2 Mini"
            fname: "lolin_s2_mini"
            fqbn: "esp32:esp32:lolin_s2_mini"
            core: "esp32:esp32@3.3.7"
            urls: "https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json"
            family: "ESP32"
            extra_libs: ""
            options: ""
            fs_size: 0x140000
            fs_base: ""
            fs_family: ""
            manual_only: false

          - name: "ESP32S3 Dev Module"
            fname: "esp32s3"
            fqbn: "esp32:esp32:esp32s3"
            core: "esp32:esp32@3.3.7"
            urls: "https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json"
            family: "ESP32"
            extra_libs: ""
            options: ""
            fs_size: 0x140000
            fs_base: ""
            fs_family: ""
            manual_only: false
        
          - name: "ESP32C3 Dev Module"
            fname: "esp32c3"
            fqbn: "esp32:esp32:esp32c3"
            core: "esp32:esp32@3.3.7"
            urls: "https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json"
            family: "ESP32"
            extra_libs: ""
            options: ""
            fs_size: 0x140000
            fs_base: ""
            fs_family: ""
            manual_only: true
            
          - name: "XIAO_ESP32C3"
            fname: "xiao_esp32c3"
            fqbn: "esp32:esp32:XIAO_ESP32C3"
            core: "esp32:esp32@3.3.7"
            urls: "https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json"
            extra_libs: ""
            options: ""
            fs_size: 0x140000
            fs_base: ""
            fs_family: ""
            manual_only: true

          # ESP8266
          - name: "Generic ESP8266 Module"
            fname: "esp8266"
            fqbn: "esp8266:esp8266:generic"
            core: "esp8266:esp8266@3.1.2"
            urls: "http://arduino.esp8266.com/stable/package_esp8266com_index.json"
            family: "ESP8266"
            extra_libs: ""
            options: ""
            fs_size: 0x140000
            fs_base: ""
            fs_family: ""
            manual_only: false

          - name: "LOLIN(WEMOS) D1 R2 & mini"
            fname: "d1_mini"
            fqbn: "esp8266:esp8266:d1_mini"
            core: "esp8266:esp8266@3.1.2"
            urls: "http://arduino.esp8266.com/stable/package_esp8266com_index.json"
            family: "ESP8266"
            extra_libs: ""
            options: ""
            fs_size: 0x140000
            fs_base: ""
            fs_family: ""
            manual_only: false


          # RP2040
          - name: "Raspberry Pi Pico"
            fname: "pico_rp2040"
            fqbn: "rp2040:rp2040:rpipico"
            family: "rp2040"
            arduino_board: "Raspberry Pi Pico/RP2040/RP2350"
            core: "rp2040:rp2040"
            urls: "https://github.com/earlephilhower/arduino-pico/releases/download/global/package_rp2040_index.json"
            extra_libs: "'MIDI Library@5.0.2'"
            options: "flash=2097152_1048576,usbstack=tinyusb"
            fs_size: 1048576
            fs_base: "0x100ff000"
            fs_family: "rp2040"
            manual_only: false

          - name: "Raspberry Pi Pico 2"
            fname: "pico2_rp2350"
            fqbn: "rp2040:rp2040:rpipico2"
            family: "rp2350-arm-s --abs-block"
            arduino_board: "Raspberry Pi Pico/RP2040/RP2350"
            core: "rp2040:rp2040"
            urls: "https://github.com/earlephilhower/arduino-pico/releases/download/global/package_rp2040_index.json"
            extra_libs: "'MIDI Library@5.0.2'"
            options: "flash=4194304_3145728,usbstack=tinyusb"
            fs_size: 3145728
            fs_base: "0x100fe000"
            fs_family: "rp2040"
            manual_only: false

          - name: "Pimoroni PicoPlus2"
            fname: "pimoroni_pico_plus2"
            fqbn: "rp2040:rp2040:pimoroni_pico_plus_2"
            family: "rp2350-arm-s --abs-block"
            arduino_board: "Raspberry Pi Pico/RP2040/RP2350"
            core: "rp2040:rp2040"
            urls: "https://github.com/earlephilhower/arduino-pico/releases/download/global/package_rp2040_index.json"
            extra_libs: "'MIDI Library@5.0.2'"
            options: "flash=16777216_15728640,usbstack=tinyusb"
            fs_size: 15728640
            fs_base: "0x100fe000"
            fs_family: "data"
            manual_only: false

          # Seeeduino
          - name: "Seeeduino XIAO (SAMD21)"
            fname: "xiao_samd21"
            fqbn: "Seeeduino:samd:seeed_XIAO_m0"
            family: "SAMD21"
            arduino_board: "Seeed SAMD Boards"
            core: "Seeeduino:samd@1.8.5"
            urls: "https://files.seeedstudio.com/arduino/package_seeeduino_boards_index.json"
            extra_libs: ""
            options: ""
            fs_size: ""
            fs_base: ""
            fs_family: ""
            manual_only: false

          # STM32
          - name: "Generic STM32F4 Series - BlackPill F411CE"
            fname: "genf4_blackpill_stm32f411ce"
            fqbn: "STMicroelectronics:stm32:GenF4:pnum=BLACKPILL_F411CE"
            core: "STMicroelectronics:stm32"
            urls: "https://github.com/stm32duino/BoardManagerFiles/raw/main/package_stmicroelectronics_index.json"
            family: "STM32"
            extra_libs: ""
            options: ""
            fs_size: ""
            fs_base: ""
            fs_family: ""
            manual_only: false

          - name: "Generic STM32H7 Series - Daisy Seed"
            fname: "genh7_daisy_seed"
            fqbn: "STMicroelectronics:stm32:GenH7:pnum=DAISY_SEED"
            core: "STMicroelectronics:stm32"
            urls: "https://github.com/stm32duino/BoardManagerFiles/raw/main/package_stmicroelectronics_index.json"
            family: "STM32H7"
            extra_libs: "DaisyDuino@1.7.0"
            options: ""
            fs_size: ""
            fs_base: ""
            fs_family: ""
            manual_only: false

          # Teensy
          - name: "Teensy 4.1"
            fname: "teensy41"
            fqbn: "teensy:avr:teensy41"
            core: "teensy:avr"
            urls: "https://www.pjrc.com/teensy/package_teensy_index.json"
            family: "Teensy"
            extra_libs: ""
            options: ""
            fs_size: ""
            fs_base: ""
            fs_family: ""
            manual_only: true

        exclude:
          - board: # no audio output at the moment
              name: "XIAO_ESP32C3"

          - board: # pin definition missing
              name: "Generic ESP8266 Module"
              
          - board: # no audio output at the moment
              name: "ESP32C3 Dev Module"

          - board: # does not support littleFS
              name: "Seeeduino XIAO (SAMD21)"

          - board: # does not support littleFS
              name: "Generic STM32F4 Series - BlackPill F411CE"

          - board: # does not support littleFS
              name: "Generic STM32H7 Series - Daisy Seed"

          - board: # does not support littleFS
              name: "Teensy 4.1"

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Install Arduino CLI
      uses: arduino/setup-arduino-cli@v1

    - name: Install core
      run: |
        arduino-cli core update-index --additional-urls ${{ matrix.board.urls }}
        for i in 1 2 3; do
          arduino-cli core install ${{ matrix.board.core }} --additional-urls ${{ matrix.board.urls }} \
            && break || sleep 20
        done

    - name: Install libraries
      run: |
        arduino-cli lib install \
          "Adafruit GFX Library@1.10.10" \
          "Adafruit SSD1306@2.4.5" \
          "Adafruit BusIO@1.14.1"

        if [ ! -z "${{ matrix.board.extra_libs }}" ]; then
          arduino-cli lib install ${{ matrix.board.extra_libs }}
        fi

    - name: Install Custom Libraries
      run: |
        mkdir -p ~/Arduino/libraries

        git clone --depth 1 https://github.com/marcel-licence/ML_SynthTools.git \
          ~/Arduino/libraries/ML_SynthTools

        git clone --depth 1 https://github.com/marcel-licence/ML_SynthTools_Lib.git \
          ~/Arduino/libraries/ML_SynthTools_Lib

    - name: Generate embedded MOD data
      if: false
      # if: matrix.board.family == 'Teensy' || matrix.board.family == 'STM32' || matrix.board.family == 'SAMD21'
      run: |
        mkdir -p src/generated

        # Download samples and sf2
        curl -L "http://www.williamkage.com/snes_soundfonts/yoshis_island_soundfont.zip" -o yoshis_island_soundfont.zip
        unzip -o yoshis_island_soundfont.zip -d data

        echo "Data contents:"
        ls -lah data

        # Convert to C array
        xxd -i yoshis_island_soundfont.mod > src/generated/yoshis_island_soundfont.c


    - name: Compile Sketch
      run: |
        FULL_FQBN="${{ matrix.board.fqbn }}"
        if [ ! -z "${{ matrix.board.options }}" ]; then
          FULL_FQBN="${FULL_FQBN}:${{ matrix.board.options }}"
        fi

        arduino-cli compile \
          --fqbn "$FULL_FQBN" \
          --output-dir build/${{ matrix.board.fname }} \
          ./

    - name: Generate UF2 (SAMD21)
      if: matrix.board.family == 'SAMD21'
      run: |
        BIN_FILE=$(find build -name "*.bin" | head -n 1)
        curl -L https://raw.githubusercontent.com/microsoft/uf2/master/utils/uf2conv.py -o uf2conv.py
        curl -L https://raw.githubusercontent.com/microsoft/uf2/master/utils/uf2families.json -o uf2families.json
        python3 uf2conv.py "$BIN_FILE" --family ${{ matrix.board.family }} --convert --output build/firmware.uf2

    - name: Rename UF2 (RP2xxx)
      if: contains(matrix.board.family, 'rp2')
      run: mv build/${{ matrix.board.fname }}/*.uf2 build/${{ matrix.board.fname }}/firmware.uf2 || true

    - name: Prepare data folder
      run: |
        mkdir -p data
        curl -L "http://www.williamkage.com/snes_soundfonts/yoshis_island_soundfont.zip" -o yoshis_island_soundfont.zip
        unzip -o yoshis_island_soundfont.zip -d data
        echo "Data contents:"
        ls -lah data

    - name: Locate mklittlefs
      id: findfs
      run: |
        TOOL=$(find ~/.arduino15/packages -name mklittlefs -type f | head -n 1)
    
        if [ -z "$TOOL" ]; then
          echo "mklittlefs not found!"
          exit 1
        fi
    
        echo "Found: $TOOL"
        echo "MKLITTLEFS=$TOOL" >> $GITHUB_ENV
      
    - name: Build LittleFS Image (ESP32)
      if: matrix.board.family == 'ESP32'
      run: |
        mkdir -p build/${{ matrix.board.fname }}
        "$MKLITTLEFS" \
          -c data \
          -b 4096 \
          -p 256 \
          -s 0x140000 \
          build/${{ matrix.board.fname }}/littlefs.bin
      
    - name: Build LittleFS Image
      if: matrix.board.fs_size != ''
      run: |
        mkdir -p build/${{ matrix.board.fname }}
    
        "$MKLITTLEFS" \
          -c data \
          -b 4096 \
          -p 256 \
          -s ${{ matrix.board.fs_size }} \
          build/${{ matrix.board.fname }}/littlefs.bin

    - name: Locate picotool
      if: contains(matrix.board.family, 'rp2')
      run: |
        TOOL=$(find ~/.arduino15/packages/rp2040 -name picotool -type f | head -n 1)
    
        if [ -z "$TOOL" ]; then
          echo "picotool not found!"
          exit 1
        fi
    
        echo "PICOTOOL=$TOOL" >> $GITHUB_ENV

    - name: Convert LittleFS to UF2 (RP2040)
      if: matrix.board.fs_base != ''
      run: |
        "$PICOTOOL" uf2 convert \
          build/${{ matrix.board.fname }}/littlefs.bin \
          -t bin \
          build/${{ matrix.board.fname }}/littlefs.uf2 \
          -o ${{ matrix.board.fs_base }} \
          --family ${{ matrix.board.fs_family }}

    - name: Locate elf2uf2
      if: contains(matrix.board.family, 'rp2')
      run: |
        TOOL=$(find ~/.arduino15/packages/rp2040 -name elf2uf2 -type f | head -n 1)
        echo "ELF2UF2=$TOOL" >> $GITHUB_ENV
    
    - name: Convert LittleFS to UF2 (RP2040)
      if: false # contains(matrix.board.family, 'rp2')
      run: |
        "$ELF2UF2" \
          build/${{ matrix.board.fname }}/littlefs.bin \
          build/${{ matrix.board.fname }}/littlefs_b.uf2
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: firmware-${{ matrix.board.fname }}
        path: |
          build/${{ matrix.board.fname }}
          src/generated

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          build/${{ matrix.board.fname }}/**/*.bin
          build/${{ matrix.board.fname }}/**/*.uf2
          build/${{ matrix.board.fname }}/**/*.hex
          build/${{ matrix.board.fname }}/**/*.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
